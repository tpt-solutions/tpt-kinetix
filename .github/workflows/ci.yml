name: CI

on:
  push:
    branches: ["master", "claude/**", "feature/**"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --lib --bins --tests

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  docs:
    name: Docs (cargo doc)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  msrv:
    name: MSRV (pinned toolchain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Reads the version pinned in rust-toolchain.toml (must match
      # workspace.package.rust-version). This job fails if the workspace no
      # longer builds on the declared MSRV.
      - name: Read MSRV from Cargo.toml
        id: msrv
        shell: bash
        run: |
          MSRV="$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"([0-9.]+)".*/\1/')"
          echo "version=$MSRV" >> "$GITHUB_OUTPUT"
          echo "Detected MSRV: $MSRV"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --locked

  deny:
    name: Deny (licenses / advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - run: cargo deny check

  fuzz-check:
    name: Fuzz targets compile
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Check fuzz targets compile (demux)
        run: cargo fuzz build fuzz_mp4_box
        working-directory: tpt-kinetix-demux
      - name: Check fuzz targets compile (demux mkv)
        run: cargo fuzz build fuzz_mkv_ebml
        working-directory: tpt-kinetix-demux
      - name: Check fuzz targets compile (av1)
        run: cargo fuzz build fuzz_obu_parse
        working-directory: tpt-kinetix-av1
      - name: Check fuzz targets compile (h264)
        run: cargo fuzz build fuzz_h264_nal
        working-directory: tpt-kinetix-h264
      - name: Check fuzz targets compile (stream)
        run: |
          cargo fuzz build fuzz_rtmp_chunk
          cargo fuzz build fuzz_rtmp_amf
          cargo fuzz build fuzz_rtmp_flv
          cargo fuzz build fuzz_hls_playlist
        working-directory: tpt-kinetix-stream
