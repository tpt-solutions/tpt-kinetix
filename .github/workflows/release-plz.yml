name: Release-plz

# Automates the shared-version monorepo publish sequence using release-plz.
# - On pushes to master, opens/updates a "release PR" that bumps versions and
#   updates changelogs.
# - When that PR merges, tags and publishes each crate to crates.io in
#   dependency order.
#
# Requires two repository secrets:
#   - CARGO_REGISTRY_TOKEN : a crates.io API token with publish scope
#   - (GITHUB_TOKEN is provided automatically)

on:
  push:
    branches: ["master"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
