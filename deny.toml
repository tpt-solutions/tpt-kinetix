# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
# All targets
targets = []

# ---------------------------------------------------------------------------
# Vulnerability advisories
# ---------------------------------------------------------------------------
[advisories]
version = 2
unmaintained = "all"
unsound = "all"
yanked = "all"
ignore = []

# ---------------------------------------------------------------------------
# License policy
# ---------------------------------------------------------------------------
[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-DFS-2016",
]
# Treat any unlisted license as a denial
unlicensed = "deny"
# Copyleft licenses not listed above are denied implicitly
copyleft = "deny"

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------------------------------------------------------------------------
# Crate bans
# ---------------------------------------------------------------------------
[bans]
# Deny multiple versions of the same crate at the same major version
multiple-versions = "deny"
# Allow wildcards in dependencies (useful in workspace members)
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []

# ---------------------------------------------------------------------------
# Source policy
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
