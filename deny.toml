# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
# All targets
targets = []

# ---------------------------------------------------------------------------
# Vulnerability advisories
# ---------------------------------------------------------------------------
[advisories]
version = 2
unmaintained = "all"
unsound = "all"
yanked = "deny"
ignore = [
  # paste is unmaintained (RUSTSEC-2024-0436) but pulled in transitively by
  # rav1e with no available upgrade path.
  "RUSTSEC-2024-0436",
]

# ---------------------------------------------------------------------------
# License policy
# ---------------------------------------------------------------------------
[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-DFS-2016",
  # libfuzzer-sys uses (MIT OR Apache-2.0) AND NCSA
  "NCSA",
  # unicode-ident uses (MIT OR Apache-2.0) AND Unicode-3.0
  "Unicode-3.0",
  # symphonia (AAC demux/decode) is MPL-2.0; file-level copyleft, unmodified.
  "MPL-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------------------------------------------------------------------------
# Crate bans
# ---------------------------------------------------------------------------
[bans]
# Deny multiple versions of the same crate at the same major version
multiple-versions = "deny"
# Allow wildcards in dependencies (useful in workspace members)
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
# Crates with multiple major versions pulled in transitively by rav1e;
# no workspace-level upgrade path exists for these.
skip = [
  { name = "getrandom" },
  { name = "nom" },
  { name = "thiserror" },
  { name = "thiserror-impl" },
  # symphonia (v1.3.2) vs. proptest/tokio (v2.x); no shared upgrade path.
  { name = "bitflags" },
]

# ---------------------------------------------------------------------------
# Source policy
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
